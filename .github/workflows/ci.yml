name: CI Build, Test, and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A three-job pipeline that builds, tests, and packages the application.
# It intentionally contains subtle artifact lifecycle issues for the lab.
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      # Intentional: upload points at ./dist/ but build writes to ./build/ .
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./dist/

  test:
    name: Test
    runs-on: ubuntu-latest
    # NOTE: This job intentionally does not declare 'needs: [build]'
    # so it may run in parallel with the build job and race on artifact download.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./build/

      - name: Run tests
        run: npm test

      # Intentional: missing "if: always()" — report upload will be skipped on failing runs
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./build/

      - name: Create release package
        run: zip -r release-package.zip ./build/

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: ./release-package.zip
